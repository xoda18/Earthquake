version: "3.8"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8080:8080"
    restart: unless-stopped

  drone-mock:
    build:
      context: .
      dockerfile: Dockerfile.drone
    restart: unless-stopped
    profiles:
      - demo  # only runs with: docker compose --profile demo up
