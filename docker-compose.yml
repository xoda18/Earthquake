# ==========================================================================
# Earthquake Intelligence System — Docker Compose
#
# Profiles:
#   ./launch.sh misha                       — VLM with NVIDIA GPU
#   ./launch.sh alex                        — VLM on Mac MPS (native) + rest in Docker
#   ./launch.sh valik --vlm-ip <MISHA_IP>  — everything in Docker, VLM on Misha's GPU
#   ./launch.sh all                         — everything in Docker (CPU, no GPU)
# ==========================================================================

x-vlm-base: &vlm-base
  build:
    context: .
    dockerfile: vlm/Dockerfile
  ports:
    - "5060:5060"
  environment: &vlm-env
    MODEL_ID: "${MODEL_ID:-llava-hf/llava-1.5-7b-hf}"
    QUANTIZE: "${QUANTIZE:-false}"
    SUPABASE_URL: "${SUPABASE_URL:-https://YOUR_PROJECT.supabase.co}"
    SUPABASE_KEY: "${SUPABASE_KEY:-YOUR_SUPABASE_SERVICE_KEY}"
    ALERT_URL: "${ALERT_URL:-https://blackboard.jass.school/blackboard}"
    STORAGE_BUCKET: "${STORAGE_BUCKET:-crack-images}"
    ORCHESTRATOR_URL: "${ORCHESTRATOR_URL:-}"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  volumes:
    - hf-cache:/root/.cache/huggingface
  restart: unless-stopped

services:
  # ------------------------------------------------------------------
  # VLM — Misha (NVIDIA GPU in Docker)
  # ------------------------------------------------------------------
  vlm-analyzer-gpu:
    <<: *vlm-base
    container_name: vlm-analyzer
    environment:
      <<: *vlm-env
      QUANTIZE: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - misha

  # ------------------------------------------------------------------
  # VLM — CPU fallback (for 'all' profile)
  # For 'alex', VLM runs natively outside Docker with MPS
  # For 'valik', VLM is on Misha's machine
  # ------------------------------------------------------------------
  vlm-analyzer-cpu:
    <<: *vlm-base
    container_name: vlm-analyzer
    profiles:
      - all

  # ------------------------------------------------------------------
  # Dashboard — Web UI (port 8080)
  # ------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles:
      - alex
      - valik
      - all

  # ------------------------------------------------------------------
  # Orchestrator — Pipeline controller (port 5050)
  # ------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "5050:5050"
    environment:
      VLM_URL: "${VLM_URL:-http://vlm-analyzer:5060}"
      ORCHESTRATOR_URL: "http://orchestrator:5050"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
      - alex
      - valik
      - all

  # ------------------------------------------------------------------
  # Drone Scanner — captures or simulates wall images, sends to VLM
  # ------------------------------------------------------------------
  drone-scanner:
    build:
      context: DJIControlClient
      dockerfile: Dockerfile
    environment:
      VLM_URL: "${VLM_URL:-http://vlm-analyzer:5060}"
      ORCHESTRATOR_URL: "${ORCHESTRATOR_URL:-}"
    profiles:
      - alex
      - valik
      - all

  # ------------------------------------------------------------------
  # Earthquake Detector — LSTM classifier reading Arduino sensor
  # ------------------------------------------------------------------
  earthquake-detector:
    build:
      context: .
      dockerfile: detection/streaming/Dockerfile
    environment:
      ORCHESTRATOR_URL: "http://orchestrator:5050"
    devices:
      - "${SERIAL_PORT:-/dev/ttyACM0}:/dev/ttyACM0"
    restart: unless-stopped
    profiles:
      - alex
      - valik
      - all

  # ------------------------------------------------------------------
  # Image Cropper — on-demand
  # ------------------------------------------------------------------
  image-cropper:
    build:
      context: .
      dockerfile: crack_detection/image_diff/Dockerfile.crop
    environment:
      ORCHESTRATOR_URL: "http://orchestrator:5050"
    volumes:
      - ./crack_detection/image_diff/input:/app/input
      - ./crack_detection/image_diff/output_cropped:/app/output
    profiles:
      - on-demand

  # ------------------------------------------------------------------
  # DB Cleanup — on-demand
  # ------------------------------------------------------------------
  db-cleanup:
    build:
      context: .
      dockerfile: db_cleanup/Dockerfile
    environment:
      SUPABASE_URL: "${SUPABASE_URL:-https://YOUR_PROJECT.supabase.co}"
      SUPABASE_KEY: "${SUPABASE_KEY:-YOUR_SUPABASE_SERVICE_KEY}"
      ORCHESTRATOR_URL: "http://orchestrator:5050"
    profiles:
      - on-demand

volumes:
  hf-cache:
